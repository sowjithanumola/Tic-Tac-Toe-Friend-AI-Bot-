<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TicMaster - Tic Tac Toe</title>

<style>
body{
font-family:Arial,sans-serif;
text-align:center;
background:#f0f2f5;
margin:0;
padding:20px;
}

h1{
color:#333;
}

#modeButtons{
margin-bottom:20px;
}

.modeBtn{
padding:10px 20px;
font-size:18px;
margin:0 10px;
cursor:pointer;
border:none;
border-radius:8px;
background:#ddd;
}

.selected{
background:#2196F3;
color:white;
}

#status{
font-size:24px;
margin:20px;
font-weight:bold;
}

#board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:5px;
justify-content:center;
margin-bottom:20px;
}

.square{
width:100px;
height:100px;
background:white;
border:2px solid #333;
font-size:60px;
font-weight:bold;
line-height:100px;
cursor:pointer;
transition:0.3s;
}

.square:hover{
background:#ddd;
}

#resetBtn{
padding:10px 20px;
font-size:18px;
border:none;
background:#4CAF50;
color:white;
border-radius:8px;
cursor:pointer;
}
</style>
</head>
<body>

<h1>🎮 TicMaster</h1>

<div id="modeButtons">
<button id="friendBtn" class="modeBtn selected">Play with Friend</button>
<button id="botBtn" class="modeBtn">Play vs Bot</button>
</div>

<div id="status">Turn: X</div>

<div id="board"></div>

<button id="resetBtn">Restart Game</button>

<script>
const boardEl=document.getElementById("board");
const statusEl=document.getElementById("status");
const resetBtn=document.getElementById("resetBtn");
const friendBtn=document.getElementById("friendBtn");
const botBtn=document.getElementById("botBtn");

let board=Array(9).fill(null);
let isXTurn=true;
let gameOver=false;
let vsBot=false;

const winningCombos=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

function createBoard(){
boardEl.innerHTML="";
for(let i=0;i<9;i++){
const square=document.createElement("div");
square.classList.add("square");
square.dataset.index=i;
square.addEventListener("click",onSquareClick);
boardEl.appendChild(square);
}
}

function onSquareClick(e){
if(gameOver)return;
const idx=+e.target.dataset.index;
if(board[idx])return;

if(vsBot){
playerMove(idx);
}else{
friendMove(idx);
}
}

function friendMove(idx){
board[idx]=isXTurn?"X":"O";
updateSquare(idx);

if(checkWinner(board,board[idx])){
statusEl.textContent=`Player ${board[idx]} wins! 🎉`;
gameOver=true;
return;
}

if(board.every(c=>c!==null)){
statusEl.textContent="It's a draw!";
gameOver=true;
return;
}

isXTurn=!isXTurn;
statusEl.textContent=`Turn: ${isXTurn?"X":"O"}`;
}

function playerMove(idx){
board[idx]="X";
updateSquare(idx);

if(checkWinner(board,"X")){
statusEl.textContent="You win!";
gameOver=true;
return;
}

if(board.every(c=>c!==null)){
statusEl.textContent="It's a draw!";
gameOver=true;
return;
}

statusEl.textContent="Bot's turn...";
gameOver=true;

setTimeout(()=>{
let botMove=getBestMove();
board[botMove]="O";
updateSquare(botMove);

if(checkWinner(board,"O")){
statusEl.textContent="Bot wins! 🤖";
gameOver=true;
return;
}

if(board.every(c=>c!==null)){
statusEl.textContent="It's a draw!";
gameOver=true;
return;
}

statusEl.textContent="Your turn (X)";
gameOver=false;
},400);
}

function updateSquare(idx){
boardEl.querySelector(`[data-index='${idx}']`).textContent=board[idx];
}

function checkWinner(b,player){
return winningCombos.some(combo=>
combo.every(i=>b[i]===player)
);
}

function getBestMove(){
let bestScore=-Infinity;
let move;

for(let i=0;i<9;i++){
if(board[i]===null){
board[i]="O";
let score=minimax(board,0,false);
board[i]=null;

if(score>bestScore){
bestScore=score;
move=i;
}
}
}
return move;
}

function minimax(b,depth,isMax){
if(checkWinner(b,"O")) return 10-depth;
if(checkWinner(b,"X")) return depth-10;
if(b.every(c=>c!==null)) return 0;

if(isMax){
let maxEval=-Infinity;
for(let i=0;i<9;i++){
if(b[i]===null){
b[i]="O";
maxEval=Math.max(maxEval,minimax(b,depth+1,false));
b[i]=null;
}
}
return maxEval;
}else{
let minEval=Infinity;
for(let i=0;i<9;i++){
if(b[i]===null){
b[i]="X";
minEval=Math.min(minEval,minimax(b,depth+1,true));
b[i]=null;
}
}
return minEval;
}
}

resetBtn.addEventListener("click",()=>{
board=Array(9).fill(null);
isXTurn=true;
gameOver=false;
statusEl.textContent=vsBot?"Your turn (X)":"Turn: X";
createBoard();
});

friendBtn.addEventListener("click",()=>{
vsBot=false;
friendBtn.classList.add("selected");
botBtn.classList.remove("selected");
resetBtn.click();
});

botBtn.addEventListener("click",()=>{
vsBot=true;
botBtn.classList.add("selected");
friendBtn.classList.remove("selected");
resetBtn.click();
});

createBoard();
</script>

</body>
</html>
